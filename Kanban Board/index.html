<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <nav>
            <div class="left">Kanban</div>
            <div class="right" id="add-task-toggle"><button>Add New Task</button></div>
        </nav>
        <section class="board">
            <div id="todo" class="cards">
                <div class="heading">
                    <div class="left">To Do</div>
                    <div class="right">Count</div>
                </div>
                
            </div>
            <div id="progress" class="cards">
                <div class="heading">
                    <div class="left">In Progress</div>
                    <div class="right">Count</div>
                </div>
            </div>
            <div id="done" class="cards">
                <div class="heading">
                    <div class="left">
                        Done
                    </div>
                    <div class="right">Count</div>
                </div>
            </div>

        </section>
    </main>

    <div class="modal">
        <div class="bg"></div>
            <center>
                
                <input id="task-title" class="taskinput" type="text" placeholder="Task Title">
                <textarea name="Description" id="Description" placeholder="Task Description"></textarea>
                <button class="add-new-task">Add Task</button>
            </center>
        </div>
    <script src="script.js"></script>
</body>
</html>
